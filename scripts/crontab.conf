# =============================================================
# Global Distribution AS — Cron-konfigurasjon
# =============================================================
#
# IKKE AKTIV ENNÅ — aktiveres fra setup-mac-mini.sh
#
# Manuell aktivering (kjør én gang):
#   crontab ~/Documents/GlobalDistribution/scripts/crontab.conf
#
# Sjekk at den er aktiv:
#   crontab -l
#
# Deaktiver alt:
#   crontab -r
#
# Format: min time dag mnd ukedag kommando
# =============================================================

SHELL=/bin/zsh
PATH=/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
HOME=/Users/gdist

# --- Vault-sync: hvert 10. minutt ---
*/10 * * * * /Users/gdist/Documents/GlobalDistribution/scripts/sync-all.sh

# --- Daglig rapport: kl 07:30 mandag–fredag ---
30 7 * * 1-5 /Users/gdist/Documents/GlobalDistribution/scripts/daily-report.sh

# --- Daglig rapport: kl 08:30 lørdag (kortere uke-oppsummering) ---
# 30 8 * * 6 /Users/gdist/Documents/GlobalDistribution/scripts/daily-report.sh

# --- Quote export: hvert 30. minutt ---
*/30 * * * * /Users/gdist/Documents/GlobalDistribution/scripts/export-quotes-to-obsidian.sh

# --- Supabase keepalive: kl 08:00 hver dag (forhindrer Free tier-pause) ---
0 8 * * * /Users/gdist/Documents/GlobalDistribution/scripts/keepalive-supabase.sh

# --- FX-kurs oppdatering: kl 09:00 hverdager (etter ECB-oppdatering) ---
0 9 * * 1-5 /Users/gdist/Documents/GlobalDistribution/scripts/update-fx-rates.sh
